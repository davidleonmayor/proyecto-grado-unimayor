<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .arrow-label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#1d4ed8" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f8fafc"/>

  <text x="800" y="50" text-anchor="middle" class="title">Arquitectura del Sistema - Gestion de Proyectos de Grado</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">Cliente-Servidor | Next.js + Express + MySQL | JWT | Docker Compose</text>

  <!-- User roles -->
  <rect x="40" y="170" width="210" height="60" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="145" y="206" text-anchor="middle" class="label">Estudiante</text>

  <rect x="40" y="250" width="210" height="60" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="145" y="286" text-anchor="middle" class="label">Docente</text>

  <rect x="40" y="330" width="210" height="60" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="145" y="366" text-anchor="middle" class="label">Decano</text>

  <rect x="40" y="410" width="210" height="60" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="145" y="446" text-anchor="middle" class="label">Coordinador</text>

  <!-- Docker Compose boundary -->
  <rect x="300" y="130" width="1180" height="770" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="320" y="165" class="label" fill="#3730a3">Docker Compose (frontend + backend + mysql)</text>

  <!-- Frontend -->
  <rect x="360" y="220" width="420" height="300" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="570" y="255" text-anchor="middle" class="label">Frontend Web</text>
  <text x="570" y="280" text-anchor="middle" class="text">Next.js 15 + React</text>
  <text x="570" y="303" text-anchor="middle" class="text">Tailwind CSS + shadcn/ui</text>
  <text x="570" y="326" text-anchor="middle" class="text">Ejecucion: Navegador</text>

  <rect x="390" y="355" width="360" height="130" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="570" y="390" text-anchor="middle" class="small">Vistas por rol y modulos</text>
  <text x="570" y="415" text-anchor="middle" class="small">Gestion de proyectos de grado</text>
  <text x="570" y="440" text-anchor="middle" class="small">Autenticacion y flujo de usuario</text>

  <!-- Backend -->
  <rect x="850" y="210" width="430" height="580" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="1065" y="245" text-anchor="middle" class="label">Backend API</text>
  <text x="1065" y="270" text-anchor="middle" class="text">Node.js + Express + TypeScript</text>

  <rect x="890" y="300" width="350" height="58" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="1065" y="335" text-anchor="middle" class="label">Routes</text>

  <rect x="890" y="372" width="350" height="58" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="1065" y="407" text-anchor="middle" class="label">Controllers</text>

  <rect x="890" y="444" width="350" height="58" rx="10" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
  <text x="1065" y="479" text-anchor="middle" class="label">Services</text>

  <rect x="890" y="516" width="350" height="58" rx="10" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <text x="1065" y="551" text-anchor="middle" class="label">Repositories</text>

  <rect x="890" y="588" width="350" height="58" rx="10" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1065" y="623" text-anchor="middle" class="label">Prisma ORM</text>

  <text x="1065" y="680" text-anchor="middle" class="small">Autenticacion y autorizacion:</text>
  <text x="1065" y="703" text-anchor="middle" class="small">JWT + RBAC (roles del sistema)</text>

  <!-- Database -->
  <rect x="870" y="825" width="390" height="90" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="1065" y="860" text-anchor="middle" class="label">MySQL Database</text>
  <text x="1065" y="885" text-anchor="middle" class="text">Persistencia relacional (Prisma)</text>

  <!-- External service -->
  <rect x="1320" y="330" width="240" height="150" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="1440" y="365" text-anchor="middle" class="label">Gmail API (Google)</text>
  <text x="1440" y="390" text-anchor="middle" class="small">Confirmacion de cuenta</text>
  <text x="1440" y="412" text-anchor="middle" class="small">Recuperacion de contrasena</text>
  <text x="1440" y="434" text-anchor="middle" class="small">Notificaciones de estado</text>

  <!-- Arrows from users to frontend -->
  <line x1="250" y1="200" x2="360" y2="285" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="280" x2="360" y2="310" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="360" x2="360" y2="335" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="440" x2="360" y2="360" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="285" y="250" class="arrow-label">HTTPS</text>

  <!-- Frontend <-> Backend -->
  <line x1="780" y1="360" x2="850" y2="360" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="850" y1="390" x2="780" y2="390" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="815" y="345" text-anchor="middle" class="arrow-label" fill="#1d4ed8">API REST</text>
  <text x="815" y="415" text-anchor="middle" class="arrow-label" fill="#1d4ed8">HTTPS/JSON + JWT</text>

  <!-- Backend internal flow arrows -->
  <line x1="1065" y1="358" x2="1065" y2="372" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1065" y1="430" x2="1065" y2="444" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1065" y1="502" x2="1065" y2="516" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1065" y1="574" x2="1065" y2="588" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1090" y="468" class="small">Flujo por capas</text>

  <!-- Backend to DB -->
  <line x1="1065" y1="646" x2="1065" y2="825" stroke="#166534" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1082" y="740" class="arrow-label">SQL</text>

  <!-- Backend to Gmail API -->
  <line x1="1280" y1="410" x2="1320" y2="410" stroke="#b91c1c" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1300" y="395" text-anchor="middle" class="arrow-label" fill="#b91c1c">OAuth2 + HTTPS</text>
</svg>
